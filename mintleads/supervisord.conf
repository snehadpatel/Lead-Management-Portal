; MintLeads Supervisord Configuration
; Manages Flask API and Streamlit Dashboard

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:flask-api]
command=python -m api.app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/flask-api.log
stderr_logfile=/var/log/supervisor/flask-api-error.log
environment=FLASK_ENV="production",PYTHONUNBUFFERED="1"

[program:streamlit-dashboard]
command=streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/streamlit.log
stderr_logfile=/var/log/supervisor/streamlit-error.log
environment=PYTHONUNBUFFERED="1"

[program:mlflow]
command=mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/mlruns
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/mlflow.log
stderr_logfile=/var/log/supervisor/mlflow-error.log
